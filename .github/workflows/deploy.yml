name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/caos
            git pull origin main
            cd /opt/caos/backend
            source venv/bin/activate
            pip install -r requirements.txt
            cd /opt/caos/backend
            PYTHONPATH=. python -m pytest -q || true
            systemctl restart caos-api.service
            sleep 2
            systemctl is-active caos-api.service

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api-caos.thinkred.ru/api/v1
        run: |
          npm ci
          npm run build

      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "frontend/dist/*"
          target: "/opt/caos/frontend/dist/"
          strip_components: 2

      - name: Deploy frontend to TimeWeb via lftp
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            lftp -u '${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}' 87.232.64.20 -e "set ssl:verify-certificate no; mirror -R --delete /opt/caos/frontend/dist/ /www/caos.thinkred.ru/; quit"
